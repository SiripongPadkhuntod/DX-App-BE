version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dexter-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-dexter_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-dexter_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    volumes:
      - ./db/migration:/migrations
    entrypoint:
      - migrate
      - -path=/migrations/
      - -database=postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-dexter_db}?sslmode=disable
      - up
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
