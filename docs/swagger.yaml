basePath: /
definitions:
  github_com_youruser_dexter-transport_internal_app_handler_dto.CreateTaskRequest:
    properties:
      description:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  github_com_youruser_dexter-transport_internal_app_handler_dto.HealthResponse:
    properties:
      code:
        type: string
      health_id:
        type: string
      message:
        type: string
      service_name:
        type: string
      status:
        type: string
    type: object
  github_com_youruser_dexter-transport_internal_app_handler_dto.TaskListResponse:
    properties:
      tasks:
        items:
          $ref: '#/definitions/github_com_youruser_dexter-transport_internal_app_handler_dto.TaskResponse'
        type: array
    type: object
  github_com_youruser_dexter-transport_internal_app_handler_dto.TaskResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  github_com_youruser_dexter-transport_internal_app_handler_dto.UpdateTaskRequest:
    properties:
